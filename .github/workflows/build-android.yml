name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17 (sem cache Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clean previous builds
        run: |
          rm -rf .buildozer ~/.buildozer

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Install Python deps
        run: |
          pip3 install --upgrade Cython==3.0.10 setuptools wheel
          pip3 install --upgrade buildozer==1.5.0

      - name: Accept Android SDK licenses
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '16.0'

      - name: Accept licenses manually
        run: |
          yes | sdkmanager --licenses

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: root-cleaner-apk
          path: bin/*.apk
